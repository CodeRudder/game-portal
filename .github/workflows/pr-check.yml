# =============================================================================
# PR门禁检查 — game-portal
# 触发条件：PR到main
# 快速检查：typecheck + 三国霸业测试 → 必须通过才能合并
# =============================================================================
name: PR Gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 快速类型检查
  # ─────────────────────────────────────────────────────────────────────────
  typecheck:
    name: 🔍 PR 类型检查
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Typecheck (root)
        run: npx tsc --noEmit

      - name: 🔍 Typecheck (three-kingdoms)
        run: npx tsc --noEmit -p tsconfig.three-kingdoms.json

  # ─────────────────────────────────────────────────────────────────────────
  # 三国霸业快速测试（PR门禁核心）
  # ─────────────────────────────────────────────────────────────────────────
  test-tk:
    name: ⚔️ PR 三国霸业测试
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: typecheck
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: ⚔️ Run Three Kingdoms Tests
        run: npm run test:tk
        env:
          CI: true

  # ─────────────────────────────────────────────────────────────────────────
  # PR门禁总结（GitHub Branch Protection 关联此Job）
  # ─────────────────────────────────────────────────────────────────────────
  pr-gate:
    name: ✅ PR 门禁通过
    runs-on: ubuntu-latest
    needs: [typecheck, test-tk]
    if: always()
    steps:
      - name: Check gate results
        run: |
          echo "## PR Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TYPECHECK="${{ needs.typecheck.result }}"
          TEST_TK="${{ needs.test-tk.result }}"

          # 类型检查
          if [ "$TYPECHECK" = "success" ]; then
            echo "✅ 类型检查: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 类型检查: FAILED ($TYPECHECK)" >> $GITHUB_STEP_SUMMARY
          fi

          # 三国霸业测试
          if [ "$TEST_TK" = "success" ]; then
            echo "✅ 三国霸业测试: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 三国霸业测试: FAILED ($TEST_TK)" >> $GITHUB_STEP_SUMMARY
          fi

          # 门禁判定
          if [ "$TYPECHECK" = "success" ] && [ "$TEST_TK" = "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 **PR 门禁通过，可以合并！**" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🚫 **PR 门禁未通过，请修复后再合并。**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
