# =============================================================================
# 每日夜间全量测试 — game-portal
# 触发条件：cron 每天 UTC 02:00 + 手动触发
# 全量测试 + 覆盖率报告 → 失败时自动创建Issue
# =============================================================================
name: Nightly Test

on:
  schedule:
    - cron: '0 2 * * *'  # UTC 02:00 = 北京时间 10:00
  workflow_dispatch:       # 支持手动触发

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 全量测试 + 覆盖率
  # ─────────────────────────────────────────────────────────────────────────
  nightly-test:
    name: 🌙 夜间全量测试
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Typecheck
        run: |
          npx tsc --noEmit
          npx tsc --noEmit -p tsconfig.three-kingdoms.json

      - name: 🧪 全量测试 + 覆盖率
        run: npm run test:coverage
        env:
          CI: true

      - name: ⚔️ 三国霸业测试 + 覆盖率
        run: npm run test:tk:coverage
        env:
          CI: true

      - name: 📊 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-coverage-${{ github.run_number }}
          path: coverage/
          retention-days: 30

      - name: 📝 Generate test summary
        if: always()
        run: |
          echo "## 🌙 Nightly Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────
  # 构建验证
  # ─────────────────────────────────────────────────────────────────────────
  nightly-build:
    name: 🏗️ 夜间构建验证
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

      - name: 🏗️ Build Three Kingdoms
        run: npm run build:tk

  # ─────────────────────────────────────────────────────────────────────────
  # 失败时自动创建 Issue
  # ─────────────────────────────────────────────────────────────────────────
  create-issue-on-failure:
    name: 🚨 失败报告
    runs-on: ubuntu-latest
    needs: [nightly-test, nightly-build]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: 🚨 Create Issue for Nightly Failure
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `## 🌙 Nightly Test Failed

            **Date**: ${date}
            **Commit**: ${context.sha.substring(0, 7)}
            **Run**: [#${context.runNumber}](${runUrl})

            ### Failed Jobs
            - nightly-test: ${{ needs.nightly-test.result }}
            - nightly-build: ${{ needs.nightly-build.result }}

            ### Action Required
            1. Click the run link above to view detailed logs
            2. Fix the failing tests or build errors
            3. Verify fix locally: \`npm test && npm run build\`
            4. Push fix and confirm CI passes

            ---
            *This issue was auto-created by the nightly test workflow.*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Nightly test failed (${date})`,
              body: body,
              labels: ['ci-failure', 'nightly', 'bug']
            });
