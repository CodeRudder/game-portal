version: "3.8"

services:
  # ============================================
  # 生产模式：Nginx 托管构建产物
  # ============================================
  game-portal:
    build:
      context: .
      dockerfile: Dockerfile
      target: serve
    container_name: game-portal
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ============================================
  # 开发模式：Vite Dev Server + 热更新
  # 使用: docker compose --profile dev up game-portal-dev
  # ============================================
  game-portal-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: game-portal-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src:ro
      - ./index.html:/app/index.html:ro
      - ./tailwind.config.js:/app/tailwind.config.js:ro
      - ./postcss.config.js:/app/postcss.config.js:ro
      - ./vite.config.ts:/app/vite.config.ts:ro
    profiles:
      - dev
    restart: unless-stopped
